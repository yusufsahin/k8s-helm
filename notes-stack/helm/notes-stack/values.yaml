nameOverride: ""
fullnameOverride: ""

api:
  replicaCount: 1
  image:
    repository: notes-stack-api
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  service:
    port: 8080
  resources: {}

web:
  replicaCount: 1
  image:
    repository: notes-stack-web
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  service:
    port: 80
  resources: {}

postgres:
  image:
    repository: postgres
    tag: "17-alpine"
    pullPolicy: IfNotPresent
  database: notesdb
  username: postgres
  password: postgres
  service:
    port: 5432
  persistence:
    enabled: true
    hostPath: /var/lib/notes-stack/postgres
  resources: {}

ingress:
  enabled: true
  className: nginx
  annotations: {}
  host: ""
  path: /
  pathType: Prefix

access:
  publicHost: ""
