apiVersion: v1
kind: Service
metadata:
  name: {{ include "notes-stack.fullname" . }}-web
  labels:
    {{- include "notes-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  selector:
    {{- include "notes-stack.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
  ports:
    - name: http
      port: 80
      targetPort: http
